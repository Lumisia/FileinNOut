# 포트폴리오 방문자용 Kubernetes Dashboard 읽기 전용 접근.
#
# 내장 'view' ClusterRole은 Secret을 제외한다(중요한 안전장치). 다만 ConfigMap,
# Pod 스펙, 환경변수는 보이므로 민감한 값은 반드시 k8s Secret에 두고 ConfigMap에는
# 넣지 말 것.
#
# 사용 방법 두 가지:
#
#  A) 토큰 방식 (deployment 변경 불필요, 권장)
#     아래 dashboard-viewer SA의 토큰을 발급해 방문자가 로그인 화면에 붙여넣는다.
#       kubectl -n kubernetes-dashboard create token dashboard-viewer --duration=24h
#     포트폴리오에서는 Cloudflare Access 뒤에 두고 이 토큰을 안내하면 된다.
#
#  B) skip-login 방식 (완전 익명 읽기 전용)
#     Dashboard의 "Skip" 버튼은 Dashboard 자신의 SA 권한으로 들어간다. 따라서
#     dashboard 배포에 --enable-skip-login 인자를 추가하고, Dashboard의 SA
#     (kubernetes-dashboard)에 아래 read-only 권한을 바인딩해야 한다.
#     인터넷에 완전 공개되므로 Cloudflare Access로 막는 편을 권장한다.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dashboard-viewer
  namespace: kubernetes-dashboard
---
# A) 토큰 방식: dashboard-viewer SA에 읽기 전용 권한 부여.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dashboard-viewer-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: dashboard-viewer
    namespace: kubernetes-dashboard
---
# B) skip-login 방식: Dashboard 자신의 SA를 읽기 전용으로 묶는다.
# (A만 쓸 거면 이 바인딩은 적용하지 않아도 된다.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-dashboard-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: kubernetes-dashboard
    namespace: kubernetes-dashboard
