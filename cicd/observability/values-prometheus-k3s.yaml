# prometheus-community/prometheus values for OCI 4 OCPU / 24 GiB k3s.
# Keep this small; it exists for Kiali metrics and portfolio visibility.

alertmanager:
  enabled: false

kube-state-metrics:
  enabled: true

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false

# lifecycle를 끄면 configmap-reload 사이드카의 localhost /-/reload 호출이 405가 되므로
# 사이드카도 비활성화한다. 스크랩 설정 변경은 pod 재시작으로 반영한다(정적 구성이라 충분).
configmapReload:
  prometheus:
    enabled: false

server:
  retention: "6h"
  # Prometheus는 자체 인증이 없고 prometheus.fileinnout.com이 공개이므로 lifecycle API를
  # 끈다. 켜져 있으면 외부에서 POST /-/quit 로 프로세스를 종료(DoS)할 수 있다.
  enableLifecycle: false
  persistentVolume:
    enabled: true
    storageClass: "local-path"
    size: 4Gi
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "800m"
      memory: "1Gi"
  global:
    scrape_interval: 30s
    evaluation_interval: 30s

# Keep the chart default scrape configs. The prometheus-community chart already
# defines prometheus, Kubernetes pod, and service jobs; redefining them here
# can make Prometheus fail with duplicate job names after chart upgrades.
