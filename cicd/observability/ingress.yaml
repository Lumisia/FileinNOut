apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus
  namespace: observability
  annotations:
    nginx.ingress.kubernetes.io/app-root: "/targets"
spec:
  ingressClassName: nginx
  rules:
    - host: prometheus.fileinnout.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
