apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kiali
  namespace: istio-system
  annotations:
    # Kiali serves under web_root /kiali, so redirect the bare host to it
    # (otherwise the host root returns 404).
    nginx.ingress.kubernetes.io/app-root: "/kiali"
spec:
  ingressClassName: nginx
  rules:
    - host: kiali.fileinnout.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kiali
                port:
                  number: 20001
---
