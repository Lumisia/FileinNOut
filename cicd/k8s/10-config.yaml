# 로컬 클러스터 내부 네트워킹 override.
# Secret(waffle-secret, .env 전체)보다 envFrom 뒤에 두어 동일 키를 덮어쓴다.
# 여기 값들은 민감정보 아님 → git 커밋 가능.
apiVersion: v1
kind: ConfigMap
metadata:
  name: waffle-config
  namespace: waffle
data:
  # --- DB (서비스명 db 로 접속) ---
  DB_SERVER: "org.mariadb.jdbc.Driver"
  DB_URL: "jdbc:mariadb://db:3306/web"
  # DB 미기동 시에도 backend 부팅 허용 (HikariCP 재시도)
  SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: "-1"

  # --- Redis (단일 인스턴스, sentinel 없음) ---
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_SENTINEL_MASTER: ""
  REDIS_SENTINEL_NODES: ""

  # --- MinIO (클러스터 내부 API) ---
  STORAGE_PROVIDER: "minio"
  MINIO_API: "http://minio:9000"

  # --- 앱 URL (로컬 NodePort 기준, http → secure cookie off) ---
  APP_FRONTEND_URL: "http://localhost:30080"
  APP_BACKEND_URL: "http://localhost:30080/api"
  APP_SECURE_COOKIE: "false"

  TZ: "Asia/Seoul"
