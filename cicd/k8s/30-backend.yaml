apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-app
  namespace: waffle
  labels:
    app: backend-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-app
  template:
    metadata:
      labels:
        app: backend-app
    spec:
      initContainers:
        # db readyiness 까지 대기 (compose 의 depends_on: service_healthy 대체)
        - name: wait-db
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z db 3306; do echo waiting db; sleep 2; done"]
        - name: wait-redis
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting redis; sleep 2; done"]
        - name: wait-minio
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z minio 9000; do echo waiting minio; sleep 2; done"]
      containers:
        - name: backend-app
          image: lumisia/backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            # 순서 중요: Secret(.env 전체) 먼저 → ConfigMap(클러스터 override) 가 동일 키를 덮어씀
            - secretRef:
                name: waffle-secret
            - configMapRef:
                name: waffle-config
          ports:
            - containerPort: 8080
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits: { cpu: "1500m", memory: "1536Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: backend-app
  namespace: waffle
spec:
  type: NodePort
  selector:
    app: backend-app
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
