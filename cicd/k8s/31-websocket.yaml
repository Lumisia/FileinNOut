apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-server
  namespace: waffle
  labels:
    app: websocket-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: websocket-server
  template:
    metadata:
      labels:
        app: websocket-server
    spec:
      initContainers:
        - name: wait-redis
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z redis 6379; do echo waiting redis; sleep 2; done"]
        - name: wait-backend
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "until nc -z backend-app 8080; do echo waiting backend; sleep 2; done"]
      containers:
        - name: websocket-server
          image: lumisia/websocket-server:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "1234"
            - name: HOST
              value: "0.0.0.0"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: BACKEND_HOST
              value: "backend-app"
            - name: BACKEND_PORT
              value: "8080"
          ports:
            - containerPort: 1234
          readinessProbe:
            tcpSocket: { port: 1234 }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: websocket-server
  namespace: waffle
spec:
  selector:
    app: websocket-server
  ports:
    - port: 1234
      targetPort: 1234
