name: fileinnout-jenkins

services:
  jenkins:
    build:
      context: ../..
      dockerfile: cicd/jenkins/Dockerfile
      args:
        KUBECTL_VERSION: ${KUBECTL_VERSION:-v1.31.4}
        HELM_VERSION: ${HELM_VERSION:-v3.16.3}
    image: fileinnout/jenkins-oci:${JENKINS_IMAGE_TAG:-local}
    container_name: fileinnout-jenkins
    user: root
    environment:
      - TZ=Asia/Seoul
      - JENKINS_OPTS=--prefix=/
    ports:
      - "127.0.0.1:8081:8080"
      - "127.0.0.1:50000:50000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  jenkins_home:
