{{- $websocketRollout := .Values.websocket.rollout | default dict -}}
{{- $websocketBlueGreen := $websocketRollout.blueGreen | default dict -}}
{{- $rolloutEnabled := true -}}
{{- if hasKey $websocketRollout "enabled" -}}
{{- $rolloutEnabled = $websocketRollout.enabled -}}
{{- end -}}
apiVersion: {{ ternary "argoproj.io/v1alpha1" "apps/v1" $rolloutEnabled }}
kind: {{ ternary "Rollout" "Deployment" $rolloutEnabled }}
metadata:
  name: {{ include "wafflebear.fullname" . }}-websocket
  labels:
    app.kubernetes.io/name: websocket
    app.kubernetes.io/part-of: wafflebear
spec:
  replicas: {{ .Values.websocket.replicaCount }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket
      app.kubernetes.io/part-of: wafflebear
  strategy:
{{- if $rolloutEnabled }}
    blueGreen:
      activeService: {{ include "wafflebear.fullname" . }}-websocket
      previewService: {{ include "wafflebear.fullname" . }}-websocket-preview
      autoPromotionEnabled: {{ default true $websocketBlueGreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ default 600 $websocketBlueGreen.scaleDownDelaySeconds }}
{{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
{{- end }}
  template:
    metadata:
      annotations:
        checksum/websocket-env: {{ include (print $.Template.BasePath "/websocket-server-configmap.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: websocket
        app.kubernetes.io/part-of: wafflebear
    spec:
{{ include "wafflebear.workerScheduling" (dict "root" . "labels" (dict "app.kubernetes.io/name" "websocket" "app.kubernetes.io/part-of" "wafflebear")) | nindent 6 }}
      terminationGracePeriodSeconds: 120
      containers:
        - name: websocket-server
          image: "{{ .Values.websocket.image.repository }}:{{ .Values.websocket.image.tag }}"
          imagePullPolicy: {{ .Values.websocket.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "wafflebear.fullname" . }}-websocket-env
          ports:
            - containerPort: {{ .Values.websocket.service.port }}
              name: ws
          startupProbe:
            httpGet:
              path: /livez
              port: {{ .Values.websocket.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.websocket.service.port }}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: {{ .Values.websocket.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 20
          resources:
{{ toYaml .Values.websocket.resources | indent 12 }}
