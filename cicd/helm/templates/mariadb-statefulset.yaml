apiVersion: v1
kind: Service
metadata:
  name: mariadb
  labels:
    app: mariadb-stateful
spec:
  clusterIP: None
  selector:
    app: mariadb-stateful
  ports:
    - name: mariadb
      port: 3306
      targetPort: mariadb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb-stateful
  template:
    metadata:
      annotations:
        # DB_ID/DB_PASS가 Secret에 있으므로, Secret이 바뀌면 MariaDB도 재시작되어야
        # 새 자격증명을 읽는다. (bootstrap Job이 user 비밀번호를 재동기화하지만, root
        # 비밀번호는 재시작으로만 갱신된다.)
        checksum/backend-secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
      labels:
        app: mariadb-stateful
    spec:
{{ include "wafflebear.workerScheduling" (dict "root" . "labels" (dict "app" "mariadb-stateful")) | nindent 6 }}
      containers:
        - name: mariadb
          image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          args:
            - --character-set-server=utf8mb4
            - --collation-server=utf8mb4_unicode_ci
          ports:
            - containerPort: 3306
              name: mariadb
          env:
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: {{ include "wafflebear.fullname" . }}-backend-env
                  key: TZ
            - name: MARIADB_DATABASE
              value: web
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "wafflebear.fullname" . }}-backend-secret
                  key: DB_ID
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wafflebear.fullname" . }}-backend-secret
                  key: DB_PASS
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "wafflebear.fullname" . }}-backend-secret
                  key: DB_PASS
            - name: MARIADB_ROOT_HOST
              value: "%"
            - name: MARIADB_AUTO_UPGRADE
              value: "1"
          volumeMounts:
            - name: mariadb-data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin --protocol=socket --socket=/run/mysqld/mysqld.sock ping -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin --protocol=socket --socket=/run/mysqld/mysqld.sock ping -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - mariadb-admin --protocol=socket --socket=/run/mysqld/mysqld.sock ping -uroot -p"$MARIADB_ROOT_PASSWORD" --silent
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml .Values.mariadb.resources | indent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: mariadb-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.mariadb.storageClassName | quote }}
        resources:
          requests:
            storage: {{ .Values.mariadb.storage.size | quote }}
