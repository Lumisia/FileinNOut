{{- $autoscaling := .Values.websocket.autoscaling | default dict }}
{{- if ($autoscaling.enabled | default false) }}
{{- $websocketRollout := .Values.websocket.rollout | default dict -}}
{{- $rolloutEnabled := true -}}
{{- if hasKey $websocketRollout "enabled" -}}
{{- $rolloutEnabled = $websocketRollout.enabled -}}
{{- end -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "wafflebear.fullname" . }}-websocket
  labels:
    app.kubernetes.io/name: websocket
    app.kubernetes.io/part-of: wafflebear
spec:
  scaleTargetRef:
    apiVersion: {{ ternary "argoproj.io/v1alpha1" "apps/v1" $rolloutEnabled }}
    kind: {{ ternary "Rollout" "Deployment" $rolloutEnabled }}
    name: {{ include "wafflebear.fullname" . }}-websocket
  minReplicas: {{ $autoscaling.minReplicas }}
  maxReplicas: {{ $autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $autoscaling.targetMemoryUtilizationPercentage }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      selectPolicy: Max
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Max
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
{{- end }}
