{{- if and .Values.ingress.enabled (not .Values.ingress.splitResources) .Values.ingress.hosts.swagger }}
{{- $swaggerHost := .Values.ingress.hosts.swagger -}}
# Swagger 호스트의 루트(/)는 백엔드에 매핑된 컨트롤러가 없어 404가 난다.
# 공개 링크가 바로 열리도록 루트만 Swagger UI로 영구 리다이렉트한다.
# /api/swagger-ui 등 실제 경로는 unified-ingress가 그대로 서빙한다.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wafflebear.fullname" . }}-swagger-redirect
  annotations:
{{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
    nginx.ingress.kubernetes.io/permanent-redirect: https://{{ $swaggerHost }}/api/swagger-ui/index.html
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ $swaggerHost | quote }}
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
{{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $swaggerHost | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
{{- end }}
{{- end }}
