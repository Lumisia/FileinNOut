{{- if and .Values.ingress.enabled (not .Values.ingress.splitResources) .Values.ingress.hosts.api }}
{{- $apiHost := default .Values.ingress.hosts.backend .Values.ingress.hosts.api -}}
{{- $frontendHost := .Values.ingress.hosts.frontend -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wafflebear.fullname" . }}-api-redirect
  annotations:
{{- with .Values.ingress.annotations }}
{{ toYaml . | nindent 4 }}
{{- end }}
    nginx.ingress.kubernetes.io/permanent-redirect: https://{{ $frontendHost }}/login
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ $apiHost | quote }}
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
          - path: /api/login
            pathType: Exact
            backend:
              service:
                name: {{ include "wafflebear.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
{{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ $apiHost | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
{{- end }}
{{- end }}
