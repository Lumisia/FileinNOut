{{- if and .Values.minio.enabled .Values.ingress.enabled .Values.ingress.hosts.minio }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "wafflebear.fullname" . }}-minio
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://{{ .Values.ingress.hosts.frontend }}"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, PUT, HEAD, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Authorization, Content-Type, Accept, Origin, User-Agent, Cache-Control, X-Requested-With, x-amz-content-sha256, x-amz-date, x-amz-security-token"
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.hosts.minio | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.minio.service.name }}
                port:
                  number: {{ .Values.minio.service.apiPort }}
{{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.hosts.minio | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
{{- end }}
{{- end }}
