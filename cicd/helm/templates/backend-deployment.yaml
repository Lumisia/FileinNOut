{{- $backendRollout := .Values.backend.rollout | default dict -}}
{{- $backendBlueGreen := $backendRollout.blueGreen | default dict -}}
{{- $rolloutEnabled := true -}}
{{- if hasKey $backendRollout "enabled" -}}
{{- $rolloutEnabled = $backendRollout.enabled -}}
{{- end -}}
apiVersion: {{ ternary "argoproj.io/v1alpha1" "apps/v1" $rolloutEnabled }}
kind: {{ ternary "Rollout" "Deployment" $rolloutEnabled }}
metadata:
  name: {{ include "wafflebear.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: wafflebear
spec:
  replicas: {{ .Values.backend.replicaCount }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 600
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/part-of: wafflebear
  strategy:
{{- if $rolloutEnabled }}
    blueGreen:
      activeService: {{ include "wafflebear.fullname" . }}-backend
      previewService: {{ include "wafflebear.fullname" . }}-backend-preview
      autoPromotionEnabled: {{ default true $backendBlueGreen.autoPromotionEnabled }}
      scaleDownDelaySeconds: {{ default 300 $backendBlueGreen.scaleDownDelaySeconds }}
{{- else }}
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
{{- end }}
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8080"
        checksum/backend-env: {{ include (print $.Template.BasePath "/backend-configmap.yaml") . | sha256sum }}
        checksum/backend-secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/part-of: wafflebear
    spec:
{{ include "wafflebear.workerScheduling" (dict "root" . "labels" (dict "app.kubernetes.io/name" "backend" "app.kubernetes.io/part-of" "wafflebear")) | nindent 6 }}
      terminationGracePeriodSeconds: 90
      initContainers:
        - name: wait-for-mariadb
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until nc -z mariadb 3306; do
                echo "waiting for mariadb"
                sleep 3
              done
        - name: wait-for-redis
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              until nc -z {{ .Values.redis.service.name }} {{ .Values.redis.service.port }}; do
                echo "waiting for redis"
                sleep 3
              done
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.port }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "wafflebear.fullname" . }}-backend-env
            - secretRef:
                name: {{ include "wafflebear.fullname" . }}-backend-secret
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          lifecycle:
            preStop:
              exec:
                command:
                  - sh
                  - -c
                  - sleep 20
          startupProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
