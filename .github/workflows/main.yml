name: Manual Image Build and Helm Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Run Helm deploy after pushing images"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-optional-deploy:
    runs-on: ubuntu-latest
    env:
      COMPOSE_IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ubuntu-latest 러너는 amd64라 단순 build는 amd64 전용 이미지를 만든다.
      # OCI 노드는 aarch64이므로 buildx로 amd64+arm64 멀티아치를 빌드/푸시한다.
      - name: Build and push multi-arch images (amd64 + arm64)
        run: |
          docker buildx bake -f docker-compose.yml \
            --set '*.platform=linux/amd64,linux/arm64' \
            --push \
            backend-app websocket-server frontend

      - name: Setup Helm
        if: ${{ inputs.deploy == 'true' && secrets.KUBE_CONFIG != '' && secrets.HELM_VALUES_PRIVATE != '' }}
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        if: ${{ inputs.deploy == 'true' && secrets.KUBE_CONFIG != '' && secrets.HELM_VALUES_PRIVATE != '' }}
        uses: azure/setup-kubectl@v4

      - name: Deploy Helm release
        if: ${{ inputs.deploy == 'true' && secrets.KUBE_CONFIG != '' && secrets.HELM_VALUES_PRIVATE != '' }}
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          HELM_VALUES_PRIVATE: ${{ secrets.HELM_VALUES_PRIVATE }}
          HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          RELEASE_NAME="${HELM_RELEASE_NAME:-fileinnout}"
          NAMESPACE="${K8S_NAMESPACE:-fileinnout}"

          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          printf '%s' "$HELM_VALUES_PRIVATE" > cicd/helm/values.private.ci.yaml

          helm upgrade --install "$RELEASE_NAME" ./cicd/helm \
            --namespace "$NAMESPACE" \
            --create-namespace \
            -f cicd/helm/values.yaml \
            -f cicd/helm/values-oci-k3s.yaml \
            -f cicd/helm/values.private.ci.yaml \
            --set-string backend.image.tag="${COMPOSE_IMAGE_TAG}" \
            --set-string frontend.image.tag="${COMPOSE_IMAGE_TAG}" \
            --set-string websocket.image.tag="${COMPOSE_IMAGE_TAG}" \
            --wait \
            --timeout 10m
