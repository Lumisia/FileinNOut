name: Manual Image Build and Helm Deploy

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Run Helm deploy after pushing images"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-and-optional-deploy:
    runs-on: ubuntu-latest
    env:
      COMPOSE_IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build images
        run: |
          docker compose -f docker-compose.yml build backend-app websocket-server frontend

      - name: Push images
        run: |
          docker compose -f docker-compose.yml push backend-app websocket-server frontend

      - name: Setup Helm
        if: ${{ inputs.deploy == 'true' && secrets.KUBE_CONFIG != '' && secrets.HELM_VALUES_PRIVATE != '' }}
        uses: azure/setup-helm@v4

      - name: Setup kubectl
        if: ${{ inputs.deploy == 'true' && secrets.KUBE_CONFIG != '' && secrets.HELM_VALUES_PRIVATE != '' }}
        uses: azure/setup-kubectl@v4

      - name: Deploy Helm release
        if: ${{ inputs.deploy == 'true' && secrets.KUBE_CONFIG != '' && secrets.HELM_VALUES_PRIVATE != '' }}
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
          HELM_VALUES_PRIVATE: ${{ secrets.HELM_VALUES_PRIVATE }}
          HELM_RELEASE_NAME: ${{ vars.HELM_RELEASE_NAME }}
          K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
        run: |
          RELEASE_NAME="${HELM_RELEASE_NAME:-fileinnout}"
          NAMESPACE="${K8S_NAMESPACE:-fileinnout}"

          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBE_CONFIG" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

          printf '%s' "$HELM_VALUES_PRIVATE" > cicd/helm/values.private.ci.yaml

          helm upgrade --install "$RELEASE_NAME" ./cicd/helm \
            --namespace "$NAMESPACE" \
            --create-namespace \
            -f cicd/helm/values.yaml \
            -f cicd/helm/values-oci-k3s.yaml \
            -f cicd/helm/values.private.ci.yaml \
            --set-string backend.image.tag="${COMPOSE_IMAGE_TAG}" \
            --set-string frontend.image.tag="${COMPOSE_IMAGE_TAG}" \
            --set-string websocket.image.tag="${COMPOSE_IMAGE_TAG}" \
            --wait \
            --timeout 10m
